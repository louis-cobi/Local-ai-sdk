appId: com.localaisdk.e2e
---
- assertVisible:
    id: e2e-model-ready
- tapOn:
    id: e2e-input
- inputText: "Stream this response and stop after a few tokens."
- tapOn:
    id: e2e-stream-start
- assertVisible:
    id: e2e-assistant-last
- tapOn:
    id: e2e-stop
- assertVisible:
    id: e2e-assistant-last

